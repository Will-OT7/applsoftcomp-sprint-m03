name: Financial News Scraper

on:
  schedule:
    - cron: '0 5 * * *'  # 5 AM UTC daily
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-process:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        working-directory: .agents/skills/financial_news
        run: uv sync
      
      - name: Run data pipeline
        working-directory: .agents/skills/financial_news
        env:
          GEMINI_API_KEY: ${{ secrets.gemini_key }}
        run: uv run python -m src.pipeline
      
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Commit and push data
        run: |
          git add .agents/skills/financial_news/data/
          git commit -m "Update financial news data: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push origin ${{ github.ref_name }}
      
      - name: Copy frontend files to docs folder for Pages
        run: |
          mkdir -p docs
          cp .agents/skills/financial_news/index.html docs/ || true
          cp .agents/skills/financial_news/app.js docs/ || true
          mkdir -p docs/data
          cp .agents/skills/financial_news/data/*.json docs/data/ || true
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: true
