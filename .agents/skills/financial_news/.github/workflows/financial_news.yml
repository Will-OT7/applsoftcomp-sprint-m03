name: Financial News Scraper

on:
  schedule:
    - cron: '0 5 * * *'  # 5 AM UTC daily
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape-and-process:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        working-directory: .agents/skills/financial_news
        run: uv sync
      
      - name: Run news scraper
        working-directory: .agents/skills/financial_news
        env:
          GEMINI_API_KEY: ${{ secrets.gemini_key }}
        run: uv run python src/scraper.py
      
      - name: Run data pipeline
        working-directory: .agents/skills/financial_news
        env:
          GEMINI_API_KEY: ${{ secrets.gemini_key }}
        run: uv run python src/pipeline.py
      
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Commit and push data
        run: |
          git add .agents/skills/financial_news/data/
          git commit -m "Update financial news data: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
